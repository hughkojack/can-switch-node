[platformio]
default_envs = esp32s3box_lcd

; =========================
; Common settings
; =========================
[env]
platform = espressif32
framework = arduino
board_upload.flash_size = 8MB
monitor_filters = default
monitor_speed = 115200

build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -I lib
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=0

; =========================
; LCD node build (full)
; =========================
[env:esp32s3box_lcd]
board = esp32s3box
monitor_port = COM7
upload_port = COM7

build_flags =
  ${env.build_flags}
  -D NODE_ROLE_LCD=1
  -D BOARD_HAS_PSRAM

; Exclude audio mixer UI (not used; wall-switch UI only)
src_filter =
  +<*>
  -<ui/audio_mixer/>

board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.flash_mode = qio

lib_deps =
  lvgl/lvgl@8.3.8
  ; plus your display panel libs here if you use them

; =========================
; Mechanical/min node build (no LVGL/UI)
; =========================
[env:node_min]
board = esp32s3box   ; change to your mechanical board later
monitor_port = COM7  ; adjust per device
upload_port = COM7

build_flags =
  ${env.build_flags}
  -D NODE_ROLE_MIN=1

; Important: do NOT compile LCD UI folder
src_filter =
  +<*>
  -<ui/*>

; No LVGL dependency here
lib_deps =
[platformio]
default_envs = node_min_c3

; =========================
; Common settings (Arduino LCD builds)
; =========================
[env]
platform = espressif32
framework = arduino
board_upload.flash_size = 8MB
monitor_filters = default
monitor_speed = 115200

build_flags =
  -D LV_CONF_INCLUDE_SIMPLE
  -I lib
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=0

; =========================
; LCD node build (full) — stays on Arduino
; =========================
[env:esp32s3box_lcd]
board = esp32s3box
monitor_port = COM7
upload_port = COM7

build_flags =
  ${env.build_flags}
  -D NODE_ROLE_LCD=1
  -D BOARD_HAS_PSRAM

build_src_filter =
  +<*>
  -<ui/audio_mixer/>
  -<common/can_mcp2515.cpp>
  -<main_idf.cpp>
  -<common/platform_gpio.cpp>
  -<common/nvs_store.cpp>

board_build.arduino.memory_type = qio_opi
board_build.f_flash = 80000000L
board_build.flash_mode = qio

lib_deps =
  lvgl/lvgl@8.3.8

; =========================
; Mechanical node — ESP-IDF 6.0 (PlatformIO espressif32 @ 7.0.1)
; =========================
[env:node_min_base]
platform = espressif32 @ 7.0.1
framework = espidf
monitor_speed = 115200
lib_ignore =
  ESP32-TWAI
  ESP32_Display_Panel
  ESP32_IO_Expander
build_flags =
  -D NODE_ROLE_MIN=1
  -D IDF_SKIP_GIT_REVISION=1

; Seeed Studio XIAO ESP32-S3 + XIAO CAN Bus Expansion Board (MCP2515)
[env:node_min]
extends = env:node_min_base
board = seeed_xiao_esp32s3
monitor_port = COM11
upload_port = COM11

build_flags =
  ${env:node_min_base.build_flags}
  -D CAN_CS_GPIO=44
  -D FIND_ME_GPIO_MAX=48

; Seeed XIAO ESP32C3 + CAN expansion + WS2812 on GPIO 7 (D5).
; MCP2515 INT is on D6/GPIO21 on the expansion board — do not use GPIO21 for WS2812.
[env:node_min_c3]
extends = env:node_min_base
board = seeed_xiao_esp32c3
board_upload.flash_size = 4MB
board_build.partitions = partitions_ota.csv
monitor_dtr = 0
monitor_rts = 0

build_flags =
  ${env:node_min_base.build_flags}
  -D CAN_CS_GPIO=20
  -D FIND_ME_GPIO_MAX=21
  -D WS2812_ENABLE=1
  -D WS2812_GPIO=7
  -D WS2812_COUNT=12
  -D FW_VERSION=0x0101
  -D OTA_CAPABLE=1

board_build.sdkconfig_options =
  CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE=y
  CONFIG_BOOTLOADER_APP_ANTI_ROLLBACK=n
  CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0=n

[env:node_min_c3_recover]
extends = env:node_min_c3
custom_erase_before_upload = yes
extra_scripts = pre:extra_scripts/pre_upload_erase.py
